name: 🪟 Build Windows Launcher

on:
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter requests psutil pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name NeoTcgLauncher --icon "icono.ico" launcher_gui.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NeoTcgLauncher-Windows
        path: dist/NeoTcgLauncher.exe
